<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarav's Site</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
        }

        /* Animated background blobs */
        .background {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: multiply;
            filter: blur(50px);
            opacity: 0.7;
            animation: float 8s infinite ease-in-out;
        }

        .blob1 {
            width: 200px;
            height: 200px;
            background: rgba(255, 107, 107, 0.4);
            top: -50px;
            left: -50px;
            animation-delay: 0s;
        }

        .blob2 {
            width: 300px;
            height: 300px;
            background: rgba(107, 178, 255, 0.4);
            bottom: -100px;
            right: -100px;
            animation-delay: 2s;
        }

        .blob3 {
            width: 250px;
            height: 250px;
            background: rgba(255, 200, 107, 0.4);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0);
            }
            25% {
                transform: translate(30px, -50px);
            }
            50% {
                transform: translate(-20px, 20px);
            }
            75% {
                transform: translate(50px, 50px);
            }
        }

        /* Container */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Glassmorphism cards */
        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Title */
        h1 {
            color: white;
            font-size: 3.5em;
            margin-bottom: 20px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffffff, #e0e0e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Subtitle */
        .subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.2em;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Interactive grid */
        .interactive-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .grid-item {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            color: white;
        }

        .grid-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .grid-item h3 {
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .grid-item p {
            font-size: 0.9em;
            opacity: 0.8;
        }

        /* Animated underline */
        .underline {
            width: 60px;
            height: 4px;
            background: linear-gradient(135deg, #667eea, #f093fb);
            border-radius: 2px;
            margin: 0 auto 20px;
            animation: slideIn 0.6s ease-out 0.3s both;
        }

        @keyframes slideIn {
            from {
                width: 0;
            }
            to {
                width: 60px;
            }
        }

        /* Floating text animation */
        .floating-text {
            position: fixed;
            top: 30px;
            right: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9em;
            animation: float 6s infinite ease-in-out;
            z-index: 2;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5em;
            }

            .card {
                padding: 30px;
            }

            .interactive-grid {
                grid-template-columns: 1fr;
            }

            .floating-text {
                display: none;
            }
        }

        /* Particle effect on click */
        .particle {
            position: fixed;
            pointer-events: none;
            animation: particleFloat 1s ease-out forwards;
        }

        @keyframes particleFloat {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
    </div>

    <div class="floating-text">✨ Explore</div>

    <div class="container">
        <div class="card">
            <div class="underline"></div>
            <h1>Aarav's Site</h1>
            <p class="subtitle">
                Welcome to my digital space. This is a unique experience built with modern design principles and interactive elements. Explore what's below and see what I've created.
            </p>

            <div class="interactive-grid">
                <div class="grid-item" onclick="activateItem(this)">
                    <h3>🎨</h3>
                    <h3>Creative</h3>
                    <p>Design & Art</p>
                </div>
                <div class="grid-item" onclick="activateItem(this)">
                    <h3>💻</h3>
                    <h3>Tech</h3>
                    <p>Innovation</p>
                </div>
                <div class="grid-item" onclick="activateItem(this)">
                    <h3>🚀</h3>
                    <h3>Projects</h3>
                    <p>Real Work</p>
                </div>
                <div class="grid-item" onclick="activateItem(this)">
                    <h3>✨</h3>
                    <h3>Future</h3>
                    <p>Next Big Thing</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Particle effect on grid item click
        function activateItem(element) {
            const rect = element.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;

            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.textContent = '✨';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                
                const angle = (Math.PI * 2 * i) / 8;
                const distance = 100;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                
                document.body.appendChild(particle);
                
                setTimeout(() => particle.remove(), 1000);
            }

            // Visual feedback
            element.style.transform = 'scale(0.95)';
            setTimeout(() => {
                element.style.transform = '';
            }, 100);
        }

        // Cursor follow effect for interactive feel
        document.addEventListener('mousemove', (e) => {
            const cards = document.querySelectorAll('.grid-item');
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                card.style.setProperty('--mouse-x', x + 'px');
                card.style.setProperty('--mouse-y', y + 'px');
            });
        });
    </script>
</body>
</html>
